# Non-LLM Commentary Rules
# 
# YAML-driven rule definitions for deterministic chess commentary.
# Each rule has:
#   - id: Unique identifier
#   - category: One of forced_outcome, tactical_motif, positional_idea, pawn_structure, filler
#   - priority: Within-category priority (higher = more important)
#   - min_verbosity: Minimum verbosity level to trigger (0-4)
#   - conditions: List of fact conditions (all must match)
#   - confidence: Base confidence (0.0-1.0)
#   - commentary: Templates and move quality label
#   - affordances: UI visualization hints

rules:
  # =============================================================================
  # FORCED OUTCOMES (Priority Tier: 100)
  # =============================================================================
  
  - id: CHECKMATE
    category: forced_outcome
    priority: 100
    min_verbosity: 0
    conditions:
      - fact: is_checkmate
        equals: true
    confidence: 1.0
    commentary:
      label: brilliant
      templates:
        - "Checkmate!"
        - "Game over. Checkmate."
        - "Checkmate is always the best move!"
    affordances:
      - type: HIGHLIGHT
        color: red
        target: king_square
  
  - id: FORCED_MATE_IN_N
    category: forced_outcome
    priority: 95
    min_verbosity: 0
    conditions:
      - fact: mate_in
        exists: true
        max_value: 5
    confidence: 0.99
    commentary:
      label: best
      templates:
        - "Forced mate in {mate_in}!"
        - "This leads to mate in {mate_in} moves."
        - "Your opponent will be forced into checkmate if you find the right moves."
        - "Getting closer to the forced checkmate."
    affordances:
      - type: SHOW_CHECKMATE
        line_source: engine_pv
  
  - id: ONLY_MOVE
    category: forced_outcome
    priority: 88
    min_verbosity: 1
    conditions:
      - fact: only_move
        equals: true
    confidence: 0.95
    commentary:
      label: best
      templates:
        - "This was the only move."
        - "There was only one option here."
        - "The only move that works."
        - "There was just one move that worked, and this was it."
    affordances:
      - type: SHOW_FOLLOW_UP
        line_source: forced_line
  
  - id: WINNING_MATERIAL_FORCED
    category: forced_outcome
    priority: 90
    min_verbosity: 1
    conditions:
      - fact: tension.has_winning_capture
        equals: true
      - fact: engine_cp_delta
        min_value: 200
    confidence: 0.92
    commentary:
      label: best
      templates:
        - "Material is won by force."
        - "This wins material."
        - "This move will win material with correct play."
    affordances:
      - type: SHOW_TACTIC
        line_source: engine_pv
  
  # =============================================================================
  # TACTICAL MOTIFS (Priority Tier: 80)
  # =============================================================================
  
  - id: PROMOTION_THREAT
    category: tactical_motif
    priority: 79
    min_verbosity: 1
    conditions:
      - fact: promotion_threat
        equals: true
    confidence: 0.93
    commentary:
      label: excellent
      templates:
        - "The pawn threatens to promote."
        - "Promotion is imminent."
        - "A dangerous pawn nears the queening square."
    affordances:
      - type: PAWN_PATH
        from: promoting_pawn_square
        to: promotion_square
        color: green
  
  - id: FORCED_CAPTURE
    category: tactical_motif
    priority: 77
    min_verbosity: 1
    conditions:
      - fact: forced_capture
        equals: true
    confidence: 0.88
    commentary:
      label: good
      templates:
        - "A forced recapture follows."
        - "The capture must be answered."
        - "This forces a response."
    affordances:
      - type: ARROW
        from: capture_square
        to: recapture_target
        color: orange

  - id: FORK_KNIGHT
    category: tactical_motif
    priority: 85
    min_verbosity: 1
    conditions:
      - fact: fork
        equals: true
    confidence: 0.95
    commentary:
      label: excellent
      templates:
        - "The knight forks {fork_targets}!"
        - "A double attack on {fork_targets}."
        - "Fork! Both {fork_targets} are under attack."
        - "Their move sets up a fork."
    affordances:
      - type: ARROW
        from: fork_square
        to: fork_targets
        color: red
  
  - id: SKEWER
    category: tactical_motif
    priority: 84
    min_verbosity: 1
    conditions:
      - fact: skewer
        equals: true
    confidence: 0.93
    commentary:
      label: excellent
      templates:
