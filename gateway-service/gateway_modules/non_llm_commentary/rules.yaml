        - "A skewer wins material."
        - "They are threatening to win material through a skewer."
    affordances:
      - type: LINE
        through: skewer_squares
        color: red
      - type: SHOW_IDEA
        idea: Skewer
  
  - id: PIN_TO_KING
    category: tactical_motif
    priority: 83
    min_verbosity: 1
    conditions:
      - fact: pin
        equals: true
      - fact: pin_to_king
        equals: true
    confidence: 0.94
    commentary:
      label: excellent
      templates:
        - "The {pinned_piece} is pinned to the king."
        - "An absolute pin. The {pinned_piece} cannot move."
        - "Your piece is pinned to the king, unable to move freely."
    affordances:
      - type: LINE
        through: pin_line
        color: orange
      - type: SHOW_IDEA
        idea: Pin
  
  - id: PIN_TO_QUEEN
    category: tactical_motif
    priority: 82
    min_verbosity: 1
    conditions:
      - fact: pin
        equals: true
      - fact: pin_to_queen
        equals: true
    confidence: 0.90
    commentary:
      label: good
      templates:
        - "The {pinned_piece} is pinned to the queen."
        - "A relative pin ties down the {pinned_piece}."
    affordances:
