        - "The king is exposed to a discovered check."
    affordances:
      - type: ARROW
        from: checking_piece
        to: king_square
        color: red
  
  - id: DOUBLE_CHECK
    category: tactical_motif
    priority: 87
    min_verbosity: 0
    conditions:
      - fact: double_check
        equals: true
    confidence: 0.98
