# ExternalSecrets for staging namespace
# These sync secrets from ClusterSecretStore to the staging namespace
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-secret
  namespace: chess-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-secrets
    kind: ClusterSecretStore
  target:
    name: gateway-secret
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          argocd.argoproj.io/compare-options: IgnoreExtraneous
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: chess-secrets
        property: AUTH_SECRET
    - secretKey: AUTH_GOOGLE_ID
      remoteRef:
        key: chess-secrets
        property: AUTH_GOOGLE_ID
    - secretKey: AUTH_GOOGLE_SECRET
      remoteRef:
        key: chess-secrets
        property: AUTH_GOOGLE_SECRET
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: chess-secrets
        property: OPENAI_API_KEY
    - secretKey: SENTRY_DSN
      remoteRef:
        key: chess-secrets
        property: SENTRY_DSN
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: chess-secrets
        property: S3_ACCESS_KEY_ID
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: chess-secrets
        property: S3_SECRET_ACCESS_KEY
