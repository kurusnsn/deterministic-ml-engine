apiVersion: apps/v1
kind: Deployment
metadata:
  name: eco-service
  labels:
    app: eco-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eco-service
  template:
    metadata:
      labels:
        app: eco-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
        - name: gitlab-registry-creds
      containers:
        - name: eco
          image: ostadchess/eco:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: env-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
