apiVersion: apps/v1
kind: Deployment
metadata:
  name: puzzle-service
  labels:
    app: puzzle-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: puzzle-service
  template:
    metadata:
      labels:
        app: puzzle-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
        - name: gitlab-registry-creds
      containers:
        - name: puzzle
          image: ostadchess/puzzle:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: env-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
