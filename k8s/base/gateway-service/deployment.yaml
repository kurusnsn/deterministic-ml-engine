apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  labels:
    app: gateway-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-01-05T17:30:00Z"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
        - name: gitlab-registry-creds
      containers:
        - name: gateway
          image: ostadchess/gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: env-config
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-secret
            - secretRef:
                name: stripe-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
