apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockfish-service
  labels:
    app: stockfish-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stockfish-service
  template:
    metadata:
      labels:
        app: stockfish-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
        - name: gitlab-registry-creds
      containers:
        - name: stockfish
          image: ostadchess/stockfish:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: env-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
