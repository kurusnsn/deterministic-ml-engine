apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ostadchess-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ostadchess

  source:
    repoURL: https://gitlab.com/kurusnsn-group/deterministic-ml-engine.git
    targetRevision: HEAD
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: ostadchess-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # Health check settings
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
