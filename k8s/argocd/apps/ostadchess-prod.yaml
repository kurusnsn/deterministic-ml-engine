apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ostadchess-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ostadchess

  source:
    repoURL: https://gitlab.com/kurusnsn-group/deterministic-ml-engine.git
    targetRevision: prod
    path: k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: ostadchess-prod

  # Automated sync for GitOps deployment
  syncPolicy:
    automated:
      prune: false  # Don't auto-delete resources not in git (safer)
      selfHeal: true  # Auto-fix drift from desired state
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground

  # Health check settings
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
