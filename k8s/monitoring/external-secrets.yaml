---
# ExternalSecret: Slack webhook URL for AlertManager
# Add SLACK_ALERTMANAGER_WEBHOOK_URL to the chess-secrets K8s secret
# in the external-secrets namespace before applying.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-secrets
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: chess-secrets
        property: SLACK_ALERTMANAGER_WEBHOOK_URL
---
# ExternalSecret: Grafana admin credentials
# Add GRAFANA_ADMIN_PASSWORD to chess-secrets before applying.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-secrets
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: chess-secrets
        property: GRAFANA_ADMIN_PASSWORD
    - secretKey: admin-user
      remoteRef:
        key: chess-secrets
        property: GRAFANA_ADMIN_USER
