<!DOCTYPE html>
<html>

<head>
  <title>Import Game</title>
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: sans-serif;
      text-align: center;
    }

    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
    }

    button:hover {
      background-color: #45a049;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }

    .error {
      color: #d32f2f;
    }
  </style>
</head>

<body>
  <h1>Chess Game Importer</h1>
  <button id="importBtn">Import</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>

</html>
